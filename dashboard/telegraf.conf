# ─────────────────────────────────────────────────────────────────────────────
# Telegraf Configuration
# Phase 6 — Time-Series Storage & Grafana Dashboards
#
# Ingests MQTT messages → InfluxDB v2
# Run: telegraf --config telegraf.conf
# ─────────────────────────────────────────────────────────────────────────────

[agent]
  interval          = "1s"
  round_interval    = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval    = "5s"
  debug             = false
  quiet             = false

# ── INPUT: MQTT Consumer ─────────────────────────────────────────────────────
[[inputs.mqtt_consumer]]
  servers = ["tcp://127.0.0.1:1883"]

  # Subscribe to all circuit topics for node1
  topics = [
    "home/energy/+/c+",
  ]

  # Parse JSON payload
  data_format = "json"
  name_override = "energy"

  # Use the MQTT topic as a tag so you can filter per-circuit in Grafana
  topic_tag = "topic"

  # Fields to extract (must match simulator.py JSON keys)
  json_string_fields = ["alert_messages", "mode"]

  # Connection settings
  client_id    = "telegraf-energy"
  keep_alive   = 60
  persistent_session = false

# ── OUTPUT: InfluxDB v2 ──────────────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls         = ["http://localhost:8086"]
  token        = "YOUR_INFLUXDB_TOKEN"    # ← replace with your token
  organization = "home"
  bucket       = "energy"

  # Retry on failure
  timeout      = "5s"
